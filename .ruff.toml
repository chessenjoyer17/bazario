line-length = 79
target-version="py310"
src = ["src"]

include = ["src/**.py", "tests/**.py"]

select = [
"ALL"
]
ignore = [
   "ARG",
   "ANN",
   "D",
   "EM101",
   "EM102",
   "PT001",
   "PT023",
   "SIM108",
   "SIM114",
   "TRY003",
   "PLW2901",
   "RET505",
   "PLR0913",
   "UP038",
   "SIM103",
   "ISC003",
]

[lint.per-file-ignores]
"tests/**" = ["TID252", "PLR2004", "S101"]

[lint.isort]
no-lines-before = ["local-folder"]

[lint.flake8-tidy-imports]
ban-relative-imports = "parents"